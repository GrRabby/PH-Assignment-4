<body class="bg-base-200 mx-auto h-fit p-7 sm:p-15 box-border">

        <div class="flex justify-between pt-3">

            <!-- this hidden checkbox controls the state -->

            </svg>
            <svg
                class="swap-on h-8 w-8 fill-current"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 30 30">

                d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z" />

            </label>
        </div>
        
        <div class="flex gap-4">
            <div class="bg-base-100 w-full rounded-lg p-5 h-[97px] border border-base-300 shadow-sm hover:-translate-y-0.5 transition duration-200 ease-in-ou hover:border-primary hover:border-opacity-20">
                <p>Total</p>
                <p><span id="total-jobs" class="text-2xl font-bold">0</span></p>
            </div>
            <div class="bg-base-100 w-full rounded-lg p-5 h-[97px] border border-base-300 shadow-sm hover:-translate-y-px hover:border-primary">
                <p>Interview</p>
                <p><span id="interview" class="text-2xl text-green-400 font-bold">0</span></p>
            </div>
            <div class="bg-base-100 w-full rounded-lg p-5 h-[97px] border border-base-300 shadow-sm hover:-translate-y-px hover:border-primary">
                <p>Rejected</p>
                <p><span id="rejected" class="text-2xl text-red-500 font-bold">0</span></p>
            </div>
        </div>
        <hr class="max-w-[1110px] h-0 bg-[#E6E7E9] mx-auto border-[#E6E7E9] mb-5">
    </header>
    <section id="tabs" class="max-w-[1110px] mx-auto sticky top-44 z-20 bg-base-200 pb-4 flex flex-col gap-4">
        <div class="flex justify-between">
            <h2 class="font-semibold">Available Jobs</h2>
            <p id="availabe-jobs" class="text-[#64748]"></p>
        </div>
        <div id="tab-items" class="flex justify-start gap-2">
            <div class="btn btn-primary rounded-sm px-8 h-8 flex items-center justify-center max-w-20" onclick="tabs_switched(this,'all')">
                <p class=" text-white text-[12px]">All</p>
            </div>
            <div class="btn  rounded-sm px-8 h-8 flex items-center justify-center max-w-20" onclick="tabs_switched(this,'interview')">
                <p class=" text-[12px]">Interview</p>
            </div>
            <div class="btn rounded-sm px-8 h-8 flex items-center justify-center max-w-20" onclick="tabs_switched(this,'rejected')">
                <p class=" text-[12px]">Rejected</p>
            </div>
        </div>
    </section>
    <section class="max-w-[1110px] mx-auto py-[30px] space-y-6 bg-base-200">
        <!-- No job available container -->
        <div id="no-jobs-card" class="bg-base-100 p-6 rounded-lg border border-base-300 shadow-md w-full h-[300px] sm:h-[400px] flex justify-center items-center flex-col gap-1 text-center">
            <img src="document.png" alt="">
            <h1 class="text-[24px] font-semibold">No jobs available</h1>
            <h2 class="text-4 text-[#64748B]">Check back soon for new job opportunities</h2>
        </div>
        <section id="job-cards" class="max-w-[1110px] job-cards flex flex-col mx-auto gap-4">
        </section>

        <!-- Use for modal confirmation -->
        <dialog id="my_modal" class="modal">
        <div class="modal-box">
            <h3 class="text-lg font-bold">Are you sure?</h3>
            <p class="py-4">Are you sure you want to delete this job?</p>
            <div class="modal-action">
                <button class="btn btn-error" onclick="confirmDelete(true)">Yes</button>
                <button class="btn" onclick="confirmDelete(false)">No</button>
            </div>
        </div>
        </dialog>

    </section>
