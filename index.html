<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Applications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="max-w-[1600px] bg-[#F8FAFC] mx-auto p-7 sm:p-15 box-border">
    <header class="dashboard max-w-[1110px] mx-auto space-y-5">
        <h1 class="text-2xl font-bold">Job Application Tracker</h1>
        <div class="flex flex-col gap-4 sm:flex-row">
            <div class="bg-base-100 w-full rounded-lg p-5">
                <p>Total</p>
                <p><span id="total-jobs" class="text-2xl font-bold">0</span></p>
            </div>
            <div class="bg-base-100 w-full rounded-lg p-5">
                <p>Interview</p>
                <p><span id="interview" class="text-2xl text-green-400 font-bold">0</span></p>
            </div>
            <div class="bg-base-100 w-full rounded-lg p-5">
                <p>Rejected</p>
                <p><span id="rejected" class="text-2xl text-red-500 font-bold">0</span></p>
            </div>
        </div>
        <hr class="max-w-[1110px] h-0 bg-[#E6E7E9] mx-auto border-[#E6E7E9]">
    </header>

    <section class="max-w-[1110px] mx-auto py-[30px] space-y-6">
        <div class="flex justify-between">
            <h2 class="font-bold text-[#002C5C]">Available Jobs</h2>
            <p id="availabe-jobs" class="text-[#64748]"></p>
        </div>
        <div class="flex justify-start gap-2">
            <div class="btn bg-blue-500 rounded-sm px-8 h-8 flex items-center justify-center max-w-20">
                <p class="text-white text-[12px]">All</p>
            </div>
            <div class="btn  bg-white rounded-sm px-8 h-8 flex items-center justify-center border border-gray-200 max-w-20">
                <p class="text-gray-400 text-[12px]">Interview</p>
            </div>
            <div class="btn bg-white rounded-sm px-8 h-8 flex items-center justify-center border border-gray-200 max-w-20">
                <p class="text-gray-400 text-[12px]">Rejected</p>
            </div>
        </div>
        <section id="job-cards" class="max-w-[1110px] job-cards flex flex-col mx-auto gap-4">
            <div id="no-jobs-card" class="bg-white p-6 rounded-lg border border-[#F1F2F4] w-full h-[400px] flex justify-center items-center flex-col gap-1">
                <img src="document.png" alt="">
                <h1 class="text-[24px] font-semibold">No jobs available</h1>
                <h2 class="text-4 text-[#64748B]">Check back soon for new job opportunities</h2>

            </div>
        </section>
    </section>
    <script src="scripts/load-jobs.js">

    </script>
</body>
</html>
